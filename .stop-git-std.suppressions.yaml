# Self-referential false positive suppressions for stop-git-std
#
# This tool is a security auditor. When it scans itself, its own source code
# matches the patterns it detects (e.g., regex literals for "mcp.*server",
# imports like "mcpServerAnalyzer", classification logic mentioning "mcp").
# None of these represent actual security risks — they ARE the detection logic.
#
# Reviewed by FrontierBoard (3-model board, 2026-04-14) as part of detection accuracy review.

suppressions:
