tool_method_matrix:
  description: Suggested implementation choices per method.
  methods:
    path_check:
      implementation:
        - pathlib
        - glob
      good_for:
        - file presence
        - directory presence
    manifest_parse:
      implementation:
        - json
        - tomllib
        - yaml
      good_for:
        - dependencies
        - scripts
        - permissions
    regex_scan:
      implementation:
        - python re
        - ripgrep optional
      good_for:
        - high-signal patterns
        - quick coverage
    entropy_scan:
      implementation:
        - custom shannon entropy
      good_for:
        - secret heuristics
    ast_scan:
      implementation:
        - python ast
        - tree-sitter
      good_for:
        - sink detection
        - route extraction
        - semantic patterns
    yaml_parse:
      implementation:
        - PyYAML
        - ruamel.yaml
      good_for:
        - workflows
        - kubernetes manifests
    dockerfile_parse:
      implementation:
        - custom parser
        - lightweight line parser
      good_for:
        - base image
        - USER and RUN checks
    osv_lookup:
      implementation:
        - OSV API client
      good_for:
        - known vulnerability enrichment
    scorecard_lookup:
      implementation:
        - OpenSSF Scorecard adapter
      good_for:
        - governance and repo posture
    capability_matrix_eval:
      implementation:
        - manifest + AST merged analysis
      good_for:
        - agent and MCP capability risk
    workflow_semantics:
      implementation:
        - YAML parse plus context flow rules
      good_for:
        - CI trigger and shell injection analysis

