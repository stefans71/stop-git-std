            - module_scope
        axis_impacts:
          trustworthiness: 4
          exploitability: 6
          abuse_potential: 14
        remediation: Remove side effects from import/init paths and require explicit user action.
        policy_hints:
          hard_stop: false
          constrain_if_present: true

runtime_rules:
  description: Findings emitted only from sandbox/runtime observation.
  recommended_methods:
    - network_observation
    - filesystem_observation
    - process_observation
  rules:
    - id: GHA-RUNTIME-001
      title: Install/build process reads SSH or cloud credential paths
      category: runtime
      subcategory: credential_access
      default_severity: critical
      default_confidence: high
      proof_type: runtime
      detection:
        primary_method: filesystem_observation
        logic: emit_if_process_reads_sensitive_paths_unexpectedly
        params:
          sensitive_paths:
            - ~/.ssh
            - ~/.aws
            - ~/.config/gcloud
            - ~/.npmrc
      evidence_shape:
        type: runtime_observation
        fields:
          - process
          - path
          - phase
      axis_impacts:
        trustworthiness: 6
        exploitability: 6
        abuse_potential: 28
      remediation: Treat as hostile until proven otherwise; isolate execution and investigate exact code path.
      policy_hints:
        hard_stop: true
        constrain_if_present: false

    - id: GHA-RUNTIME-002
      title: Unexpected outbound network to unknown domain during install
      category: runtime
      subcategory: exfiltration_or_remote_fetch
      default_severity: high
      default_confidence: medium
      proof_type: runtime
      detection:
        primary_method: network_observation
        logic: emit_if_non_registry_or_non_allowlisted_domain_contacted_during_install
      evidence_shape:
        type: runtime_observation
        fields:
          - process
          - destination_host
          - port
          - phase
      axis_impacts:
        trustworthiness: 4
        exploitability: 8
        abuse_potential: 18
      remediation: Block egress, inspect fetched payloads, and verify whether the domain is legitimate.
      policy_hints:
        hard_stop: false
        constrain_if_present: true

    - id: GHA-RUNTIME-003
      title: Runtime-observed download followed by shell execution
      category: runtime
      subcategory: observed_remote_execution
      default_severity: critical
      default_confidence: high
      proof_type: runtime
      detection:
        primary_method: process_observation
        secondary_methods:
          - network_observation
        logic: emit_if_download_process_precedes_shell_execution_in_same_phase
      evidence_shape:
        type: runtime_trace
        fields:
          - process_tree
          - destination_host
          - phase
      axis_impacts:
        trustworthiness: 6
        exploitability: 12
        abuse_potential: 30
      remediation: Abort adoption and investigate exact install/run path.
      policy_hints:
        hard_stop: true
        constrain_if_present: false

